<!doctype html><html lang="fr"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Centre de données · agent-forex</title>
<style>
:root{
--bg:#06080c;--surf:#0e1219;--surf2:#161b24;--line:rgba(70,80,95,.35);
--tx:#e6edf3;--mut:#8b949e;--dim:#5b6470;--acc:#58a6ff;--acc2:#1f6feb;
--ok:#37d67a;--okb:rgba(55,214,122,.14);--warn:#f2b53c;--warnb:rgba(242,181,60,.14);
--bad:#f2555a;--badb:rgba(242,85,90,.14);
--mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,monospace;
--sans:-apple-system,"Segoe UI",Roboto,Inter,sans-serif;}
*{box-sizing:border-box}html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--tx);font:14px/1.5 var(--sans);
background-image:radial-gradient(ellipse 90% 50% at 50% -10%,rgba(31,111,235,.10),transparent 60%)}
.wrap{max-width:1120px;margin:0 auto;padding:clamp(16px,4vw,32px)}
/* top bar */
.top{display:flex;flex-wrap:wrap;align-items:center;gap:16px;justify-content:space-between;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:12px}
.dot{width:9px;height:9px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 4px var(--okb)}
.dot.warn{background:var(--warn);box-shadow:0 0 0 4px var(--warnb)}
h1{font-size:clamp(17px,2.4vw,20px);margin:0;letter-spacing:-.02em}
.sub{color:var(--mut);font-size:12px;margin:2px 0 0}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--surf2);color:var(--tx);font:600 13px var(--sans);
padding:9px 14px;border-radius:9px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s}
.btn:hover{border-color:var(--acc);color:#fff}
.btn.primary{background:var(--acc2);border-color:var(--acc2)}.btn.primary:hover{background:var(--acc)}
.btn:active{transform:scale(.98)}.btn[disabled]{opacity:.5;cursor:wait}
/* meta strip */
.meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.mcard{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:13px 15px}
.mcard .lab{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.08em}
.mcard .val{font:600 15px var(--mono);margin-top:3px;letter-spacing:-.01em}
.pill{font:600 11px var(--sans);padding:2px 9px;border-radius:20px;display:inline-block}
.p-ok{background:var(--okb);color:var(--ok)}.p-warn{background:var(--warnb);color:var(--warn)}.p-bad{background:var(--badb);color:var(--bad)}
/* section */
h2{font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--mut);margin:26px 0 10px;font-weight:600}
.panel{background:var(--surf);border:1px solid var(--line);border-radius:14px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{font:600 11px var(--sans);text-transform:uppercase;letter-spacing:.06em;color:var(--dim);text-align:left;padding:11px 16px;border-bottom:1px solid var(--line)}
td{padding:13px 16px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:0}tbody tr:hover{background:var(--surf2)}
.src{font-weight:600}.ty{color:var(--mut);font-size:12px}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}
.age{color:var(--mut);font-family:var(--mono);font-size:12px}
.cov{font-family:var(--mono);font-size:12px}
/* carry */
.carry{display:grid;grid-template-columns:1.1fr 1.6fr;gap:16px}@media(max-width:760px){.carry{grid-template-columns:1fr}.meta .val{font-size:14px}}
.kpi{background:var(--surf);border:1px solid var(--line);border-radius:14px;padding:18px}
.kpi .eq{font:700 clamp(26px,4vw,34px) var(--mono);letter-spacing:-.02em}
.kpi .eqs{color:var(--mut);font-size:12px;margin-top:2px}
.kpi .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.kpi .g{background:var(--surf2);border:1px solid var(--line);border-radius:10px;padding:11px 12px}
.kpi .g .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.06em}
.kpi .g .v{font:600 16px var(--mono);margin-top:3px}
.pos{color:var(--ok)}.neg{color:var(--bad)}
.foot{color:var(--dim);font-size:12px;margin-top:22px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);background:var(--surf2);
border:1px solid var(--acc);color:var(--tx);padding:11px 18px;border-radius:10px;font-size:13px;transition:.3s;z-index:9;box-shadow:0 8px 30px rgba(0,0,0,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
</style></head><body><div class="wrap">

<div class="top">
  <div class="brand"><span class="dot" id="gdot"></span>
    <div><h1>Centre de données</h1><p class="sub">Disponibilité · MAJ · sources — fondation des analyses</p></div>
  </div>
  <div class="actions">
    <button class="btn" id="btnCarry">⚖︎ Tick carry</button>
    <button class="btn primary" id="btnRefresh">↻ Rafraîchir les données</button>
  </div>
</div>

<div class="meta" id="meta"></div>

<h2>Sources & disponibilité</h2>
<div class="panel"><table>
  <thead><tr><th>Source</th><th>Type</th><th>État</th><th>Couverture</th><th>Dernière MAJ</th></tr></thead>
  <tbody id="srcs"><tr><td colspan="5" style="color:var(--mut)">chargement…</td></tr></tbody>
</table></div>

<h2>Carry paper · Kraken-US <span class="pill" id="cyctrl"></span></h2>
<div class="carry">
  <div class="kpi" id="cykpi"><div class="eq">—</div></div>
  <div class="panel"><table>
    <thead><tr><th>Perp</th><th>Notional</th><th>Funding cumulé</th></tr></thead>
    <tbody id="cypos"><tr><td colspan="3" style="color:var(--mut)">chargement…</td></tr></tbody>
  </table></div>
</div>

<div class="foot"><span id="ts"></span><span>Auto-refresh 30 s · lecture seule</span></div>
</div>
<div class="toast" id="toast"></div>

<script>
const $=s=>document.querySelector(s);
function pill(t,c){return `<span class="pill ${c}">${t}</span>`}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),4000)}
function ago(iso){if(!iso)return '—';const d=(Date.now()-Date.parse(iso.replace(' ','T')))/1000;if(isNaN(d))return iso;
  if(d<90)return 'à l\'instant';if(d<5400)return 'il y a '+Math.round(d/60)+' min';if(d<172800)return 'il y a '+Math.round(d/3600)+' h';return 'il y a '+(d/86400).toFixed(1)+' j'}
function covCell(v){if(!v)return '<span class="cov" style="color:var(--dim)">—</span>';v=String(v);
  const c=v.startsWith('PASS')?'var(--ok)':(v.startsWith('ATTENTION')||v.startsWith('STALE'))?'var(--warn)':'var(--bad)';
  const short=v.replace(/^(PASS|ATTENTION|STALE|FAIL)\s*/,'').split('|')[0].trim();
  return `<span class="cov" style="color:${c}">${short||v}</span>`}
function stateCell(v){const ok=String(v).startsWith('PASS');return pill(ok?'● Live':'● Down',ok?'p-ok':'p-bad')}

async function load(){
  try{
    const d=await fetch('/api/datacenter').then(r=>r.json());
    const h=d.health||{},u=d.updated||{},m=d.manifests||{};
    const verdict=h._verdict||'?';const good=verdict==='PASS';
    $('#gdot').className='dot'+(good?'':' warn');
    // meta strip
    const lastMaj=u.updated||h._checked;
    $('#meta').innerHTML=[
      ['État global',pill(verdict||'—',good?'p-ok':'p-warn')],
      ['Dernière MAJ',`<span class="num">${ago(lastMaj)}</span>`],
      ['Prochaine MAJ',`<span class="num">05:00 UTC</span>`],
      ['Durée dernière',`<span class="num">${u.duration_s!=null?u.duration_s+' s':'—'}</span>`],
    ].map(x=>`<div class="mcard"><div class="lab">${x[0]}</div><div class="val">${x[1]}</div></div>`).join('');
    // sources catalog
    const rows=[
      {n:'Alpaca',t:'Crypto spot',st:h.api_alpaca,cov:h.crypto_pairs,maj:lastMaj},
      {n:'OANDA',t:'Forex / métaux',st:h.api_oanda,cov:h.forex_pairs,maj:lastMaj},
      {n:'Kraken Futures',t:'Funding perps',st:h.api_kraken_futures,cov:h.data_funding,maj:(m.funding||{}).updated,sym:(m.funding||{}).symbols},
      {n:'Coinalyze',t:'Funding multi-ans',st:h.api_coinalyze,cov:h.data_funding_multi,maj:(m.funding_multi||{}).updated,sym:(m.funding_multi||{}).symbols},
      {n:'Coinalyze',t:'Capacity 12h + OI',st:h.api_coinalyze,cov:h.data_capacity,maj:(m.capacity||{}).updated,sym:(m.capacity||{}).symbols},
    ];
    $('#srcs').innerHTML=rows.map(r=>`<tr>
      <td class="src">${r.n}</td><td class="ty">${r.t}</td>
      <td>${stateCell(r.st)}</td>
      <td>${covCell(r.cov)}${r.sym?` <span class="age">· ${r.sym} sym</span>`:''}</td>
      <td class="age">${ago(r.maj)}</td></tr>`).join('');
  }catch(e){$('#srcs').innerHTML='<tr><td colspan="5" class="neg">API indisponible</td></tr>'}

  try{
    const c=await fetch('/api/carry').then(r=>r.json());
    if(!c.available){$('#cykpi').innerHTML='<div class="eqs">carry paper — pas encore de données</div>';$('#cypos').innerHTML='<tr><td colspan="3" style="color:var(--mut)">en attente du 1er tick</td></tr>';return}
    const pnl=(c.equity||0)-(c.capital||0),net=c.net_ann_pct,pc=c.pairs_control||{};
    const ctrlOK=pc.resolues===pc.attendu;
    $('#cyctrl').outerHTML=pill(`contrôle ${pc.resolues||'?'}/${pc.attendu||'?'}`,ctrlOK?'p-ok':'p-warn');
    $('#cykpi').innerHTML=`
      <div class="eq ${pnl>=0?'pos':'neg'}">${pnl>=0?'+':''}${pnl.toFixed(2)} $</div>
      <div class="eqs">equity ${(c.equity||0).toLocaleString('fr-FR')} $ · capital ${(c.capital||0).toLocaleString('fr-FR')} $</div>
      <div class="grid2">
        <div class="g"><div class="l">Net annualisé</div><div class="v ${net>0?'pos':net<0?'neg':''}">${net?(net>0?'+':'')+net+' %':'démarrage'}</div></div>
        <div class="g"><div class="l">Univers</div><div class="v">${c.universe_size||0} perps</div></div>
      </div>`;
    const ps=c.positions||[];
    $('#cypos').innerHTML=ps.length?ps.map(p=>{const f=p.funding_acc||0;return `<tr>
      <td class="src">${p.base}</td><td class="num">${(p.notional||0).toLocaleString('fr-FR')} $</td>
      <td class="num ${f>=0?'pos':'neg'}">${f>=0?'+':''}${f.toFixed(2)} $</td></tr>`}).join('')
      :'<tr><td colspan="3" style="color:var(--mut)">aucune position — funding ≤ 0 partout, en cash</td></tr>';
  }catch(e){$('#cypos').innerHTML='<tr><td colspan="3" class="neg">indisponible</td></tr>'}
  $('#ts').textContent='Rafraîchi '+new Date().toLocaleTimeString('fr-FR');
}

$('#btnRefresh').onclick=async function(){this.disabled=true;this.textContent='↻ MAJ en cours…';
  try{const r=await fetch('/api/datacenter/refresh',{method:'POST'}).then(r=>r.json());
    toast(r.started?'MAJ lancée en arrière-plan (~8 min). Les états se mettront à jour progressivement.':'Échec du lancement');}
  catch(e){toast('Erreur réseau')}
  setTimeout(()=>{this.disabled=false;this.innerHTML='↻ Rafraîchir les données'},3000)};

$('#btnCarry').onclick=async function(){this.disabled=true;this.textContent='⚖︎ Tick…';
  try{const r=await fetch('/api/carry/tick',{method:'POST'}).then(r=>r.json());
    toast(r.done?'Tick carry exécuté.':'Échec du tick');load();}
  catch(e){toast('Erreur réseau')}
  this.disabled=false;this.innerHTML='⚖︎ Tick carry'};

load();setInterval(load,30000);
</script></body></html>
