# À coller DANS le bloc "server { ... }" HTTPS de /etc/nginx/sites-available/agent-forex
# (celui que certbot a configuré, écoute 443), à côté du "location / { ... }" :
location /api/ {
    proxy_pass http://127.0.0.1:8001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}
